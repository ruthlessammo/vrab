<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VRAB Login</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0d1117; color: #c9d1d9; font-family: 'JetBrains Mono', 'Fira Code', monospace;
    display: flex; justify-content: center; align-items: center; min-height: 100vh;
  }
  .login-box {
    background: #161b22; border: 1px solid #30363d; border-radius: 6px;
    padding: 32px; width: 320px;
  }
  h1 { font-size: 16px; color: #58a6ff; margin-bottom: 20px; text-align: center; }
  input[type="password"] {
    width: 100%; padding: 10px 12px; background: #0d1117; border: 1px solid #30363d;
    border-radius: 4px; color: #c9d1d9; font-family: inherit; font-size: 13px;
    margin-bottom: 12px;
  }
  input[type="password"]:focus { outline: none; border-color: #58a6ff; }
  button {
    width: 100%; padding: 10px; background: #238636; border: none; border-radius: 4px;
    color: #fff; font-family: inherit; font-size: 13px; cursor: pointer;
  }
  button:hover { background: #2ea043; }
  .error { color: #f85149; font-size: 12px; margin-bottom: 12px; text-align: center; }
</style>
</head>
<body>
<div class="login-box">
  <h1>VRAB Dashboard</h1>
  {% if error %}<div class="error">{{ error }}</div>{% endif %}
  <form method="POST">
    <input type="password" name="password" placeholder="Password" autofocus>
    <button type="submit">Login</button>
  </form>
</div>
</body>
</html>
